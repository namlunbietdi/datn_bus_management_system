<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Theo dõi xe buýt tại điểm dừng</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" rel="stylesheet">
    <link href="/assets/css/styles.css" rel="stylesheet">
  </head>
  <body class="guest-body">
    <div class="guest-shell">
      <header class="app-header guest-header">
        <div class="d-flex align-items-center gap-3 min-w-0">
          <img src="/assets/images/utc_logo.png" alt="UTC" class="brand-logo">
          <img src="/assets/images/feee_logo.png" alt="FEEE" class="brand-logo">
          <div class="min-w-0">
            <div class="header-kicker">ĐỒ ÁN TỐT NGHIỆP</div>
            <div class="header-title">HỆ THỐNG GIÁM SÁT VÀ ĐIỀU PHỐI XE BUÝT</div>
            <div class="header-subtitle">Theo dõi xe sắp đến điểm dừng theo thời gian thực</div>
          </div>
        </div>
        <div class="guest-header-status" id="guestStatus">Đang tải bản đồ</div>
      </header>

      <main class="guest-map-stage">
        <div id="guestMap"></div>

        <section class="guest-stop-panel" id="stopPanel" aria-live="polite">
          <div class="guest-panel-handle"></div>
          <div class="guest-panel-head">
            <div class="min-w-0">
              <div class="guest-panel-kicker" id="selectedStopCode">Điểm dừng</div>
              <h1 id="selectedStopName">Chọn một điểm dừng trên bản đồ</h1>
              <p id="selectedStopAddress"></p>
            </div>
            <button class="btn btn-light guest-icon-btn" id="closePanelBtn" type="button" title="Đóng">
              <i class="bi bi-x-lg"></i>
            </button>
          </div>
          <div class="guest-panel-meta">
            <span id="arrivalCount">0 xe</span>
            <span id="arrivalUpdatedAt">Chưa cập nhật</span>
          </div>
          <div id="arrivalList" class="guest-arrival-list">
            <div class="guest-empty">Bấm vào điểm dừng để xem xe sắp đến.</div>
          </div>
        </section>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/assets/js/guest.js"></script>
  </body>
</html>
